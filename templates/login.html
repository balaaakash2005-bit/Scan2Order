{% extends "base.html" %}

{% block title %}Login - Admin Panel{% endblock %}

{% block content %}
<div style="min-height: 80vh; display: flex; align-items: center; justify-content: center;">
    <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2
                style="margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--text-primary), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Admin Login</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Enter your credentials to access the dashboard
            </p>
        </div>

        {% if error %}
        <div
            style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" required
                    placeholder="Enter admin username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" required
                    placeholder="Enter password">
            </div>

            <button type="submit" class="confirm-order-btn" style="margin-top: 1rem;">
                Login to Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
