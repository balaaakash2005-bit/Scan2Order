services:
  - type: web
    name: qr-food-ordering
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_URL
        fromService:
          type: web
          name: qr-food-ordering
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: qr-food-db
          property: connectionString

databases:
  - name: qr-food-db
    databaseName: qr_food_db
    user: qr_food_user