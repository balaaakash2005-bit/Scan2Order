{% extends "base.html" %}

{% block title %}Add Item - Sadakathullahappa College Canteen{% endblock %}
{% block tagline %}Add New Canteen Item{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div class="glass-panel" style="padding: 2.5rem;">
        <h2 style="margin-bottom: 2rem; text-align: center; color: var(--primary);">Add New Menu Item</h2>

        <form method="POST" action="{{ url_for('add_item') }}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="name">Item Name *</label>
                <input type="text" id="name" name="name" class="form-input" required placeholder="e.g., Masala Dosa">
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <select id="category" name="category" class="form-input" required>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Tea">Tea</option>
                    <option value="Drinks">Drinks</option>
                    <option value="Juice">Juice</option>
                </select>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" class="form-input"
                    placeholder="Describe the dish..."></textarea>
            </div>

            <div class="form-group">
                <label for="price">Price (₹) *</label>
                <input type="number" id="price" name="price" step="0.01" min="0" class="form-input" required
                    placeholder="0.00">
            </div>

            <div class="form-group">
                <label for="daily_stock">Daily Stock Limit *</label>
                <input type="number" id="daily_stock" name="daily_stock" min="1" class="form-input" required
                    value="50" placeholder="e.g., 50">
                <small style="color: var(--text-secondary);">This is the count that resets every morning.</small>
            </div>

            <div class="form-group">
                <label for="image">Item Image</label>
                <div
                    style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2); text-align: center;">
                    <input type="file" id="image" name="image" accept="image/*" class="form-input"
                        style="border: none; background: transparent;">
                </div>
            </div>

            <div class="form-group checkbox-group"
                style="display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px;">
                <input type="checkbox" id="available" name="available" checked
                    style="width: 20px; height: 20px; accent-color: var(--primary);">
                <label for="available" style="margin: 0; cursor: pointer;">Available for customers</label>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="confirm-order-btn" style="flex: 1;">Add Item</button>
                <a href="{{ url_for('admin') }}" class="btn"
                    style="flex: 1; text-align: center; background: rgba(0,0,0,0.05); color: var(--text-secondary);">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
